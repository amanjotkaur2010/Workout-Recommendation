{% extends "base.html" %}

{% block title %}FitAI - Sign Up{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 col-lg-5">
        <div class="card-custom p-4 p-sm-5">
            <div class="text-center mb-4">
                <i class="bi bi-person-plus-fill text-gradient fs-1 mb-2"></i>
                <h2 class="fw-bold">Create Account</h2>
                <p class="text-secondary-custom small">Start generating your custom AI routines today</p>
            </div>
            
            <form action="{{ url_for('auth.register') }}" method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label small fw-semibold">Username</label>
                    <input type="text" class="form-control form-control-custom" id="username" name="username" required placeholder="Choose a username" minlength="3">
                </div>
                
                <div class="mb-3">
                    <label for="email" class="form-label small fw-semibold">Email Address</label>
                    <input type="email" class="form-control form-control-custom" id="email" name="email" required placeholder="name@example.com">
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label small fw-semibold">Password</label>
                    <input type="password" class="form-control form-control-custom" id="password" name="password" required placeholder="Minimum 6 characters" minlength="6">
                </div>
                
                <div class="mb-4">
                    <label for="confirm_password" class="form-label small fw-semibold">Confirm Password</label>
                    <input type="password" class="form-control form-control-custom" id="confirm_password" name="confirm_password" required placeholder="Re-enter password">
                </div>
                
                <button type="submit" class="btn btn-primary-custom w-100 py-2.5 fs-6 mb-3">Sign Up</button>
            </form>
            
            <div class="text-center small">
                <span class="text-secondary-custom">Already have an account?</span>
                <a href="{{ url_for('auth.login') }}" class="text-primary fw-semibold text-decoration-none">Log In</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
