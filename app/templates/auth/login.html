{% extends "base.html" %}

{% block title %}FitAI - Log In{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 col-lg-5">
        <div class="card-custom p-4 p-sm-5">
            <div class="text-center mb-4">
                <i class="bi bi-lightning-charge-fill text-gradient fs-1 mb-2"></i>
                <h2 class="fw-bold">Welcome Back</h2>
                <p class="text-secondary-custom small">Log in to track your exercises and metrics</p>
            </div>
            
            <form action="{{ url_for('auth.login') }}" method="POST">
                <div class="mb-3">
                    <label for="email_or_username" class="form-label small fw-semibold">Username or Email</label>
                    <input type="text" class="form-control form-control-custom" id="email_or_username" name="email_or_username" required placeholder="name@example.com or username">
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label small fw-semibold">Password</label>
                    <input type="password" class="form-control form-control-custom" id="password" name="password" required placeholder="••••••••">
                </div>
                
                <div class="mb-4 d-flex justify-content-between align-items-center">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label small text-secondary-custom" for="remember">Remember me</label>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary-custom w-100 py-2.5 fs-6 mb-3">Log In</button>
            </form>
            
            <div class="text-center small">
                <span class="text-secondary-custom">Don't have an account?</span>
                <a href="{{ url_for('auth.register') }}" class="text-primary fw-semibold text-decoration-none">Sign Up</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
